<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>矿大校园地标</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.4.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.4.0/dist/ol.js"></script>
    <style>
        body { margin: 0; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // 底图：OpenStreetMap
        var basemap = new ol.layer.Tile({
            source: new ol.source.OSM()
        });

        // 你的三个点（从 GeoServer 来）
        var points = new ol.layer.Tile({
            source: new ol.source.TileWMS({
                url: 'http://localhost:8080/geoserver/tiger/wms',   // ← 改这里：把 tiger 换成你的工作区名
                params: {
                    'LAYERS': 'tiger:cumt_landmarks',               // ← 改这里：把图层名换成你的
                    'TILED': true
                },
                serverType: 'geoserver'
            })
        });

        var map = new ol.Map({
            target: 'map',
            layers: [basemap, points],
            view: new ol.View({
                center: ol.proj.fromLonLat([117.20, 34.22]),        // 矿大坐标
                zoom: 16
            })
        });
    </script>
</body>
</html>
